<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="800" height="480" fill="#fcfcfc" rx="10" />
  
  <!-- Заголовок файла -->
  <rect x="50" y="20" width="700" height="50" fill="#2c3e50" rx="4" />
  <text x="400" y="50" font-family="monospace" font-size="16" fill="white" text-anchor="middle" font-weight="bold">HEADER (28 bytes) — magic: "D8BK" (v2.0)</text>

  <!-- Блок 1: TOPOLOGY -->
  <rect x="50" y="80" width="700" height="40" fill="#ecf0f1" stroke="#bdc3c7" />
  <rect x="50" y="80" width="100" height="40" fill="#95a5a6" />
  <text x="100" y="105" font-family="Arial" font-size="12" fill="white" text-anchor="middle">0x0100</text>
  <text x="400" y="105" font-family="Arial" font-size="13" font-weight="bold">TOPOLOGY: Grid, Lanes, Domains</text>
  <text x="740" y="105" font-family="Arial" font-size="11" text-anchor="end">16 bytes</text>

  <!-- Блок 2: TILE_PARAMS_V2 -->
  <rect x="50" y="130" width="700" height="60" fill="#e1f5fe" stroke="#03a9f4" />
  <rect x="50" y="130" width="100" height="60" fill="#03a9f4" />
  <text x="100" y="165" font-family="Arial" font-size="12" fill="white" text-anchor="middle">0x0121</text>
  <text x="400" y="160" font-family="Arial" font-size="13" font-weight="bold">TILE_PARAMS_V2: Thresholds, Decay, Pattern</text>
  <text x="400" y="180" font-family="Arial" font-size="11" fill="#555">Size: TileCount × 13 bytes</text>

  <!-- Блок 3: ROUTING_FLAGS -->
  <rect x="50" y="200" width="700" height="50" fill="#fff9c4" stroke="#fbc02d" />
  <rect x="50" y="200" width="100" height="50" fill="#fbc02d" />
  <text x="100" y="230" font-family="Arial" font-size="12" fill="white" text-anchor="middle">0x0131</text>
  <text x="400" y="225" font-family="Arial" font-size="13" font-weight="bold">ROUTING_FLAGS: N/E/S/W Connections</text>
  <text x="400" y="240" font-family="Arial" font-size="11" fill="#555">Size: TileCount × 2 bytes</text>

  <!-- Блок 4: WEIGHTS_PACKED (Самый жирный) -->
  <rect x="50" y="260" width="700" height="100" fill="#e8f5e9" stroke="#4caf50" />
  <rect x="50" y="260" width="100" height="100" fill="#4caf50" />
  <text x="100" y="315" font-family="Arial" font-size="12" fill="white" text-anchor="middle">0x0160</text>
  <text x="400" y="305" font-family="Arial" font-size="14" font-weight="bold">WEIGHTS_PACKED: 8×8 Synaptic Map (mag3+sign1)</text>
  <text x="400" y="325" font-family="Arial" font-size="12" fill="#2e7d32" font-weight="bold">SIZE: TileCount × 40 bytes (~85% of file)</text>

  <!-- Блок 5: CRC32 -->
  <rect x="50" y="370" width="700" height="40" fill="#ffebee" stroke="#ef5350" />
  <rect x="50" y="370" width="100" height="40" fill="#ef5350" />
  <text x="100" y="395" font-family="Arial" font-size="12" fill="white" text-anchor="middle">0xFFFE</text>
  <text x="400" y="395" font-family="Arial" font-size="13" font-weight="bold">CRC32: Integrity Check (zlib/IEEE)</text>
  <text x="740" y="395" font-family="Arial" font-size="11" text-anchor="end">4 bytes</text>

  <!-- Инфо-подпись -->
  <text x="400" y="450" font-family="monospace" font-size="12" fill="#777" text-anchor="middle">Endianness: Little-Endian | Alignment: 1-byte (Packed)</text>
</svg>
