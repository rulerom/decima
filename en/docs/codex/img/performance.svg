<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="800" height="400" fill="#ffffff" />
  
  <!-- Сетка -->
  <path d="M 80 50 L 80 340 L 750 340" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 80 50 L 750 50" stroke="#eee" stroke-width="1" fill="none" />
  <path d="M 80 146 L 750 146" stroke="#eee" stroke-width="1" fill="none" />
  <path d="M 80 243 L 750 243" stroke="#eee" stroke-width="1" fill="none" />

  <!-- Ось X (Тайлы) -->
  <text x="80" y="365" font-family="Arial" font-size="12" text-anchor="middle">256</text>
  <text x="247" y="365" font-family="Arial" font-size="12" text-anchor="middle">512</text>
  <text x="415" y="365" font-family="Arial" font-size="12" text-anchor="middle">1024</text>
  <text x="582" y="365" font-family="Arial" font-size="12" text-anchor="middle">2048</text>
  <text x="750" y="365" font-family="Arial" font-size="12" text-anchor="middle">4096</text>
  <text x="415" y="390" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Количество тайлов</text>

  <!-- ЛИНИЯ 1: Время цикла (мкс) - СИНЯЯ -->
  <!-- Масштаб: 340 - (value * 0.9) -->
  <polyline points="80,320 247,301 415,267 582,196 750,60" fill="none" stroke="#0366d6" stroke-width="3" />
  <circle cx="80" cy="320" r="4" fill="#0366d6" />
  <circle cx="247" cy="301" r="4" fill="#0366d6" />
  <circle cx="415" cy="267" r="4" fill="#0366d6" />
  <circle cx="582" cy="196" r="4" fill="#0366d6" />
  <circle cx="750" cy="60" r="4" fill="#0366d6" />
  <text x="70" y="60" font-family="Arial" font-size="12" fill="#0366d6" text-anchor="end">311 мкс</text>

  <!-- ЛИНИЯ 2: FPS - ОРАНЖЕВАЯ -->
  <!-- Масштаб: 340 - (value / 50) -->
  <polyline points="80,50 247,117 415,216 582,277 750,307" fill="none" stroke="#fb8500" stroke-width="3" stroke-dasharray="5,3" />
  <circle cx="80" cy="50" r="4" fill="#fb8500" />
  <circle cx="247" cy="117" r="4" fill="#fb8500" />
  <circle cx="415" cy="216" r="4" fill="#fb8500" />
  <circle cx="582" cy="277" r="4" fill="#fb8500" />
  <circle cx="750" cy="307" r="4" fill="#fb8500" />
  <text x="90" y="45" font-family="Arial" font-size="12" fill="#fb8500">15.7k FPS</text>
  <text x="760" y="300" font-family="Arial" font-size="12" fill="#fb8500">1.6k FPS</text>

  <!-- Легенда -->
  <rect x="580" y="10" width="160" height="40" fill="white" stroke="#ccc" />
  <line x1="590" y1="20" x2="610" y2="20" stroke="#0366d6" stroke-width="3" />
  <text x="615" y="25" font-family="Arial" font-size="12">Время цикла</text>
  <line x1="590" y1="35" x2="610" y2="35" stroke="#fb8500" stroke-width="3" stroke-dasharray="2,1" />
  <text x="615" y="40" font-family="Arial" font-size="12">FPS (Drop)</text>
</svg>
