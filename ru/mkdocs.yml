site_name: DECIMA-8 🧠 — Нейроморфный Движок
site_url: https://decima.rulerom.com
theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
  custom_dir: overrides

plugins:
  - search
  - mermaid2

extra_css:
  - css/mermaid.css
  - assets/rulerom.css

extra:
  analytics:
    provider: yandex
    property: 107008715

nav:
  - '📖 Главная':
    - 'Обзор': index.md
    - 'Кодекс': codex/index.md
    - 'Контракт': CONTRACT.md
    - 'IDE': tools/ide.md

  - '🏗 Архитектура':
    - 'Тайлы': arch/tiles.md
    - 'Шина BUS16': arch/bus.md
    - 'Фазы READ/WRITE': arch/phase.md
    - 'Маршрутизация': arch/routing.md
  
  - '💭 Философия':
    - '🧱 Фундамент (Суть)':
      - 'Личность — это не магия': philosophy/base/personality.md
      - 'Я / НЕ Я': philosophy/base/detector-antagonist.md
      - 'Субстрат не важен': philosophy/base/substrate.md
    - '💎 Архитектура (Принципы)': 
      - 'Детерминизм как этика' : philosophy/arch/determenism.md
      - 'Эстафета вместо роутера' : philosophy/arch/relay.md
      - 'Отец и Шина' : philosophy/arch/father-bus.md
    - '🌍 Контекст (Мир)': 
      - 'Земля как Training Phase' : philosophy/world/earth.md
      - 'Воннегут и Руди Герц' : philosophy/world/piano14.md
      - 'Зависимость и Любовь' : philosophy/world/addict.md

  - '📋 Спецификация':
    - 'Bake TLV': spec/bake.md
    - 'Протокол': spec/protocol.md

  - '🔌 Интеграция':
    - 'UDP Protocol': integration/udp.md

  - '💎 Экосистема': ecosystem.md
