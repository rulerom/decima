<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#fcfcfc" rx="8" />
  
  <!-- Шкала -->
  <line x1="50" y1="150" x2="750" y2="150" stroke="#333" stroke-width="2" />
  
  <!-- 256 тайлов -->
  <rect x="50" y="130" width="44" height="20" fill="#81d4fa" stroke="#0288d1" />
  <text x="72" y="170" font-family="Arial" font-size="11" text-anchor="middle">256</text>
  
  <!-- 1024 тайла -->
  <rect x="94" y="110" width="100" height="40" fill="#29b6f6" stroke="#0288d1" />
  <text x="144" y="170" font-family="Arial" font-size="11" text-anchor="middle">1024</text>
  
  <!-- 4096 тайлов -->
  <rect x="194" y="70" width="400" height="80" fill="#0288d1" stroke="#01579b" />
  <text x="394" y="170" font-family="Arial" font-size="11" text-anchor="middle">4096 тайлов (228 КБ)</text>

  <!-- Сравнение с L3 Cache (типичный 32МБ) -->
  <rect x="50" y="20" width="700" height="10" fill="#eeeeee" stroke="#999" />
  <text x="400" y="15" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Типичный L3 Cache CPU (32 МБ) — Сетку тайлов почти не видно на этом фоне</text>
</svg>
