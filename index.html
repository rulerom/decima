<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECIMA-8 — Redirecting...</title>
    <script>
        (function() {
            const locale = navigator.language || navigator.userLanguage;
            const localeLower = locale.toLowerCase();

            // Language preferences in order
            if (localeLower.includes('zh') || localeLower.includes('cn') || localeLower.includes('tw')) {
                // Chinese (Simplified or Traditional)
                window.location.replace('./zh/');
            } else if (localeLower.includes('ru')) {
                // Russian
                window.location.replace('./ru/');
            } else {
                // Default to English for all other locales
                window.location.replace('./en/');
            }
        })();
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d9ff; }
        .links { margin-top: 30px; }
        .links a {
            display: block;
            color: #00d9ff;
            text-decoration: none;
            margin: 10px 0;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🧠 DECIMA-8</h1>
    <p>Redirecting to documentation... / Перенаправление на документацию... / 重定向到文档...</p>
    
    <div class="links">
        <p>Or choose manually / Или выберите вручную / 或手动选择:</p>
        <a href="./ru/">🇷🇺 Русская версия</a>
        <a href="./en/">🇬🇧 English version</a>
        <a href="./zh/">🇨🇳 中文版</a>
    </div>
</body>
</html>
